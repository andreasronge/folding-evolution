# Overnight queue — chem-tape v2 probe.
#
# Entries are executed in order unless they share a `parallel_group` number,
# in which case all entries in the same group run concurrently. Entries
# without parallel_group run sequentially as before.
# `expect_outputs` is relative to $RUN_DIR.
# Each sweep command invokes sweep.py with --output-root $RUN_DIR so all
# outputs land under the queue's per-entry directory. sweep.py writes
# sweep_index.json at the root of its output dir — that's our "done"
# sentinel.
#
# Compute budget per entry (per architecture-v2.md / prior v1 reference):
#   20 seeds × pop=1024 × gens=1500 × 4-worker Rayon ≈ 10-20 min per sweep.
# `timeout_seconds: 1800` (30 min) is ~2× the expected time — safe margin.
# The 3 seed-expansion entries inherit the same per-sweep cost.
#
# Ordering: pre-reg graded experiments first (§v2.1 → §v2.4), exploratory
# §v2.5 next, seed expansions + tape-length headroom last. §v2.4 is run
# regardless of pre-reg gating (gating is decided in morning triage).

