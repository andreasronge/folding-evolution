sweep_name: sum_gt_10_scaling
# Experiments §2c: does the Arm A > Arm B gap persist at higher budget, or
# does Arm B catch up? Distinguishes "v1 design has a ceiling" from "v1 has
# a search-efficiency cost". Answer informs whether the permeable-rule
# redesign (§3) is strictly necessary or just an optimization.
base:
  task: sum_gt_10
  tape_length: 32
  n_examples: 64
  holdout_size: 256
  tournament_size: 3
  elite_count: 2
  mutation_rate: 0.03
  crossover_rate: 0.7
  backend: mlx
  log_every: 100
grid:
  arm: [A, B]
  pop_size: [1024, 4096]
  generations: [1500, 3000]
  seed: [0, 1, 2, 3, 4]
