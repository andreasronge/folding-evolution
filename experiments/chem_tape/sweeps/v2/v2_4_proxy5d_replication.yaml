sweep_name: v2_4_proxy5d_replication
# §v2.4-proxy-5d-followup-cloud-reexpansion (v1): independent-seed
# replication of the non-monotone R_fit dip-and-recovery observed on
# seeds 0..19. Tests falsifiable prediction P-1 of the "non-monotone
# single-mechanism cloud-destabilisation" tentative mechanism name
# from the §v2.4-proxy-5a-followup-mid-bp chronicle.
#
# Disjoint seed block: seeds 20..39 (paired-comparable with seeds
# 0..19 at identical bp cells).
# bp grid focused on the dip-recovery region: {0.65, 0.70, 0.75}.
# sf=0.01 only — drift cells (sf=0.0) not needed for replication
# (behaviour characterised by §v2.4-proxy-5a and mid-bp sweeps).
#
# If dip-and-recovery replicates → P-1 discharged → promote chronicle
# to findings-layer narrowing (principle 22: confirmatory, proxy-basin
# FWER family grows to 4, α = 0.0125).
# If dip-and-recovery fails to replicate → P-1 falsified → upstream
# chronicle's non-monotone reading superseded (principle 13).
#
# See Plans/prereg_v2-4-proxy-5d-followup-cloud-reexpansion.md for
# outcome grid + decision rule.
