sweep_name: v2_8_phaseA_scout
# §v2.8 Phase A scout: 5-seed × 5 candidate tasks fixed-task on the 6-token
# integer body INPUT SUM CONST_2 ADD THRESHOLD_SLOT GT. Selection rule:
# pick the threshold pair whose Fmin lands in [1, 4] across the 5-seed scout.
# Selected pair is fed into v2_8_main.yaml manually (or by a thin selector
# script) for Phase B. See Plans/prereg_v2_8_integer_6token.md.
base:
  alphabet: v2_probe
  tape_length: 32
  n_examples: 64
  holdout_size: 256
  pop_size: 1024
  generations: 1500
  tournament_size: 3
  elite_count: 2
  mutation_rate: 0.03
  crossover_rate: 0.7
  backend: mlx
  log_every: 50
  arm: BP_TOPK
  topk: 3
  bond_protection_ratio: 0.5
grid:
  task:
    - sum_plus2_gt_15_slot
    - sum_plus2_gt_17_slot
    - sum_plus2_gt_20_slot
    - sum_plus2_gt_22_slot
    - sum_plus2_gt_25_slot
  seed: [0, 1, 2, 3, 4]
